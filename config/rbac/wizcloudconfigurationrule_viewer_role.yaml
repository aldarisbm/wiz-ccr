# This rule is not used by the project wizcloudconfigurationrule itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to security.joseberr.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: wizcloudconfigurationrule
    app.kubernetes.io/managed-by: kustomize
  name: wizcloudconfigurationrule-viewer-role
rules:
- apiGroups:
  - security.joseberr.io
  resources:
  - wizcloudconfigurationrules
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - security.joseberr.io
  resources:
  - wizcloudconfigurationrules/status
  verbs:
  - get
