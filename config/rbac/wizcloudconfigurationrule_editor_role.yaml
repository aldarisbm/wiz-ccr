# This rule is not used by the project wizcloudconfigurationrule itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the security.joseberr.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: wizcloudconfigurationrule
    app.kubernetes.io/managed-by: kustomize
  name: wizcloudconfigurationrule-editor-role
rules:
- apiGroups:
  - security.joseberr.io
  resources:
  - wizcloudconfigurationrules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - security.joseberr.io
  resources:
  - wizcloudconfigurationrules/status
  verbs:
  - get
